# zones.conf — DNS Zone Definitions
# ─────────────────────────────────────────────────────────────────────────────
# Format:  FQDN = IP
# Rules:
#   - Domain must end with a dot  (FQDN format)
#   - Lines starting with # are comments
#   - Blank lines are ignored
# ─────────────────────────────────────────────────────────────────────────────

[zones]
example.com.  = 93.184.216.34
exa.com.      = 10.0.0.1
test.local.   = 192.168.1.100
alefreza.local. =10.187.187.187
